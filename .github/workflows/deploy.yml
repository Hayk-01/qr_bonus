name: Build and Deploy to Kubernetes
on:
  push:
    branches: [main, master]
  workflow_dispatch:
env:
  BACKEND_IMAGE: ghcr.io/hayk-01/qr_bonus-backend
  FRONTEND_IMAGE: ghcr.io/hayk-01/qr_bonus-frontend
jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./QRBonus.API
          file: ./QRBonus.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./QR_Bonus.Admin
          file: ./QR_Bonus.Admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Verify cluster
        run: kubectl get nodes
      - name: Create ghcr pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=default \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy Backend
        run: |
          TAG="${{ needs.build-backend.outputs.image_tag }}"
          sed "s|:latest|:${TAG}|g" k8s/backend.yaml | kubectl apply -f -
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${TAG} -n default
          kubectl rollout status deployment/backend --timeout=180s
      - name: Deploy Frontend
        run: |
          TAG="${{ needs.build-frontend.outputs.image_tag }}"
          sed "s|:latest|:${TAG}|g" k8s/frontend.yaml | kubectl apply -f -
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${TAG} -n default
          kubectl rollout status deployment/frontend --timeout=180s
      - name: Verify
        run: kubectl get pods -n default && echo "Deploy complete"
